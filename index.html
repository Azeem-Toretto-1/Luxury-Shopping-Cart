<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartify • Luxury Shopping Experience</title>
    <link rel="stylesheet" href="style.css" />

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<defs>
<linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
<stop offset='0%' stop-color='%23111111'/>
<stop offset='100%' stop-color='%23D4AF37'/>
</linearGradient>
</defs>

<rect width='100' height='100' rx='25'
fill='url(%23g)'/>

<path
d='M28 38H75L68 65H35L28 38Z'
stroke='white'
stroke-width='5'
fill='none'/>

<circle cx='40' cy='78' r='5'
fill='white'/>

<circle cx='65' cy='78' r='5'
fill='white'/>

</svg>"
    />
  </head>
  <body>
    <div class="loader">
      <div class="loader-logo">ShopCart.</div>

      <div class="loader-progress">
        <div class="loader-fill"></div>
      </div>
    </div>
    <div class="container">
      <div class="header">
        <h1>🛍️ Cartify</h1>
        <p class="brand-subtitle">Luxury Shopping Experience</p>
        <div class="cart-icon" id="cartIcon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="200"
            height="200"
            viewBox="0 0 24 24"
          >
            <path
              fill="#000000"
              d="M0 1h4.764l.545 2h18.078l-3.666 11H7.78l-.5 2H22v2H4.72l1.246-4.989L3.236 3H0V1Zm7.764 11h10.515l2.334-7H5.855l1.909 7ZM4 21a2 2 0 1 1 4 0a2 2 0 0 1-4 0Zm14 0a2 2 0 1 1 4 0a2 2 0 0 1-4 0Z"
            />
          </svg>
          <span class="cart-badge" id="cartBadge">0</span>
        </div>
      </div>
      <div class="products-grid" id="productGrid"></div>
      <div class="overlay" id="overLay"></div>
      <div class="sidebar" id="sideBar">
        <div class="sidebar-header">
          <h2>Shopping Cart</h2>
          <button class="close-btn" id="closeBtn">&times;</button>
        </div>
        <div class="cart-content" id="cartContent"></div>
        <div class="sidebar-footer" id="sidebarFooter">
          <div class="total">
            <span>Total:</span> <span id="totalPrice"></span>
          </div>
          <button class="checkout-btn">Checkout</button>
        </div>
        <div class="cart-message" id="cartMessage">Product Added to Cart</div>
      </div>
    </div>

    <audio id="addSound">
      <source src="./sounds/mixkit-select-click-1109.wav" type="audio/mpeg" />
    </audio>

    <audio id="removeSound">
      <source
        src="./sounds/mixkit-old-camera-shutter-click-1137.wav"
        type="audio/mpeg"
      />
    </audio>

    <div class="checkout-modal" id="checkoutModal">
      <div class="modal-box">
        <h2>🎉 Order Confirmed</h2>

        <p>Thank you for shopping with Cartify.</p>

        <button id="continueBtn">Continue Shopping</button>
      </div>
    </div>

    <footer class="footer">Built with ❤️ by Azeem Malik</footer>
    <script src="./script.js"></script>
  </body>
</html>
